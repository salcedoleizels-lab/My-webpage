<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Roman;
    background: linear-gradient(135deg, #74ebd5, #acb6e5);
}

.card{
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    width:300px;
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid white;
    margin-bottom:15px;
}

.name{
    font-size:24px;
    font-weight:bold;
    color:white;
}

.info{
    color:Black;
    margin-top:3px;
    font-size:16px;
}
</style>

</head>
<body>

<div class="card">

    
    <img src="leizep.jpg" class="profile">

    
    <div class="name">Leizel Salcedo</div>
    
         <p>Course: BSIS 1B</p>
         <p>School:Baao Community College
    
</p>
    <div class="info">Age: 18</div>

</div>

</body>
</html>
